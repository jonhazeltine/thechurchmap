# Railway deployment configuration.
#
# The healthcheck below is the main safety net: Railway will hit
# /api/healthz on every new deploy and will NOT swap traffic to the new
# version until it responds 200. If the healthcheck fails for the full
# timeout window, the deploy is marked failed and the previous healthy
# version keeps serving.

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
